<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Training Contact Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://res.cdn.office.net/teams-js/2.11.0/js/MicrosoftTeams.min.js"></script>
    <script src="https://amazon-connect.github.io/amazon-connect-streams/amazon-connect-1.x.js"></script>
    <style>
        /* El Iframe de AWS ocupa todo el panel izquierdo. AWS dibuja aquí el teclado, transferencias y esperas. */
        #ccp-container iframe {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header Superior -->
    <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-bold">Connect Center | Teams</h1>
        </div>
        
        <div class="flex items-center space-x-6">
            
            <!-- Selector de Estado Dinámico (Se llena con los estados de Amazon Connect) -->
            <div class="flex items-center space-x-2">
                <div id="statusIndicator" class="w-3 h-3 rounded-full bg-gray-400"></div>
                <select id="agentStatusSelect" class="bg-blue-800 text-white text-sm border-none rounded p-1 outline-none cursor-pointer" disabled>
                    <option value="">Cargando estados...</option>
                </select>
            </div>
            
            <!-- Perfil del Usuario y Foto -->
            <div class="flex items-center space-x-3 text-right border-l border-blue-700 pl-4">
                <div>
                    <p id="userName" class="font-semibold text-sm">Cargando...</p>
                    <p id="userRole" class="text-xs text-blue-300">Agente</p>
                </div>
                <!-- Foto de perfil extraída de Teams -->
                <img id="userProfilePic" src="https://ui-avatars.com/api/?name=Agente&background=0D8ABC&color=fff" alt="Perfil" class="h-10 w-10 rounded-full border-2 border-white object-cover hidden">
                <div id="userInitials" class="h-10 w-10 bg-blue-600 rounded-full flex items-center justify-center font-bold border-2 border-white">
                    --
                </div>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal (Split View) -->
    <div class="flex flex-1 overflow-hidden p-4 space-x-4">
        
        <!-- Panel Izquierdo: Teléfono Completo de AWS -->
        <div class="w-1/3 min-w-[320px] bg-white rounded-lg shadow-lg flex flex-col border border-gray-200 overflow-hidden">
            <div class="p-2 bg-gray-800 text-white text-xs font-semibold text-center">Panel Telefónico AWS</div>
            <!-- Aquí AWS inyectará el teclado, transferencias, selector de país y Quick Connects (Compañeros) -->
            <div id="ccp-container" class="flex-1 w-full bg-gray-50"></div>
        </div>

        <!-- Panel Derecho: Gestión de Casos y CRM -->
        <div class="flex-1 bg-white rounded-lg shadow-lg flex flex-col border border-gray-200">
            <div class="p-3 bg-gray-100 border-b flex justify-between items-center">
                <span class="font-semibold text-gray-700">Gestión de Casos Activos</span>
            </div>
            
            <div class="p-6 flex-1 overflow-y-auto" id="crm-panel">
                <div class="text-center text-gray-400 mt-20" id="crm-empty-state">
                    <p class="text-lg">Esperando interacción...</p>
                    <p class="text-sm">Cuando entre una llamada, los datos del cliente aparecerán aquí.</p>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
